name: IndexNow Publish

on:
  push:
    branches:
      - main
    paths:
      - 'src/pages/**/*.astro'

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Submit changed URLs to IndexNow (streaming)
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/pages/**/*.astro' \
            | grep -v 'src/pages/embed/' \
            | grep -v 'src/pages/sitemap' \
            | grep -v 'src/pages/llms' \
            || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No relevant files changed."
            exit 0
          fi

          KEY="2095e7971ef44da8bf52b45c356470bc"
          BASE="https://calculations.tools"

          while IFS= read -r file; do
            if echo "$file" | grep -q '\['; then
              echo "  skip (dynamic route): $file"
              continue
            fi

            url_path=$(echo "$file" \
              | sed 's|^src/pages||' \
              | sed 's|\.astro$||' \
              | sed 's|/index$||')

            url="${BASE}${url_path}"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.indexnow.org/indexnow?url=${url}&key=${KEY}")
            echo "  ${url} → HTTP ${STATUS}"
          done <<< "$CHANGED_FILES"
