name: IndexNow Publish

on:
  push:
    branches:
      - main
    paths:
      - 'src/pages/**/*.astro'

jobs:
  submit-indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gather and validate URLs
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/pages/**/*.astro' \
            | grep -v 'src/pages/embed/' \
            | grep -v 'src/pages/sitemap' \
            | grep -v 'src/pages/llms' \
            || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No relevant files changed."
            exit 0
          fi

          curl -s https://calculations.tools/sitemap-0.xml \
            | grep -oP '(?<=<loc>)[^<]+' > sitemap_urls.txt || true

          FINAL_URLS=""
          while IFS= read -r file; do
            url_path=$(echo "$file" \
              | sed 's|^src/pages||' \
              | sed 's|\.astro$||' \
              | sed 's|/index$||')

            if echo "$url_path" | grep -q '\['; then
              prefix=$(echo "$url_path" | sed 's|\[.*||')
              MATCHES=$(grep "^https://calculations.tools${prefix}" sitemap_urls.txt || true)
            else
              MATCHES=$(grep -P "^https://calculations.tools${url_path}/?$" sitemap_urls.txt || true)
            fi

            if [ -n "$MATCHES" ]; then
              FINAL_URLS+="$MATCHES"$'\n'
            fi
          done <<< "$CHANGED_FILES"

          FINAL_URLS=$(echo "$FINAL_URLS" | sort -u | sed '/^$/d')

          if [ -n "$FINAL_URLS" ]; then
            echo "CHANGED_URLS<<EOF" >> $GITHUB_ENV
            echo "$FINAL_URLS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Submit to IndexNow
        if: env.CHANGED_URLS != ''
        run: |
          URL_JSON=$(echo "$CHANGED_URLS" | awk '{printf "\"%s\",", $0}' | sed 's/,$//')

          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"calculations.tools\",
              \"key\": \"2095e7971ef44da8bf52b45c356470bc\",
              \"keyLocation\": \"https://calculations.tools/2095e7971ef44da8bf52b45c356470bc.txt\",
              \"urlList\": [${URL_JSON}]
            }"
